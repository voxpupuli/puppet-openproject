---
# Per-module overrides for modulesync-managed files.
# See: https://github.com/voxpupuli/modulesync_config
#
# Rakefile — marked unmanaged to preserve beaker fixture wiring.
#
# This module uses configure_beaker(modules: :fixtures) in
# spec_helper_acceptance.rb, which requires spec/fixtures/modules to be
# populated before the beaker suite starts. The standard modulesync
# Rakefile.erb template (as of 10.8.0) does not wire fixtures:prep as a
# prerequisite for the beaker task, because the modulesync default is
# modules: :metadata (config_defaults.yml line 127).
#
# Neither beaker-rspec, puppet_fixtures, nor voxpupuli-acceptance (up to
# 4.4.0) auto-wire this dependency. The voxpupuli-acceptance README
# explicitly states fixture wiring is the module developer's responsibility:
#   https://github.com/voxpupuli/voxpupuli-acceptance#fixtures
#
# Until the Rakefile.erb template gains a configurable fixture wiring block
# (see: upstream contribution pending), this file must remain unmanaged.
#
Rakefile:
  unmanaged: true
#
# Acceptance tests — disabled in GHA CI.
#
# The acceptance tests install the full OpenProject stack (repository, package,
# configure with PostgreSQL + Apache) and require a full OS with systemd. The
# GHA CI uses podman containers which lack proper locale (causing
# "invalid byte sequence in US-ASCII" on Debian) and cannot reach the
# packager.io RPM repository (returning HTTP 500 on CentOS).
#
# Acceptance tests are validated locally using libvirt VMs before pushing.
#
.github/workflows/ci.yml:
  acceptance_tests: false
